# Produção com Postgres no Supabase (sem container postgres local).
# Uso: docker compose -f docker-compose.supabase.yml up -d --build

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 4000
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:80"

volumes:
  redis_data:
