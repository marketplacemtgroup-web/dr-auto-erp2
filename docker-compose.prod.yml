services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autocore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autocore}
      POSTGRES_DB: ${POSTGRES_DB:-autocore}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autocore} -d ${POSTGRES_DB:-autocore}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://autocore:autocore@postgres:5432/autocore}
      DIRECT_URL: ${DIRECT_URL:-postgresql://autocore:autocore@postgres:5432/autocore}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: .
      dockerfile: app/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

  portal:
    build:
      context: .
      dockerfile: apps/portal/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3001:80"

volumes:
  postgres_data:
  redis_data:

